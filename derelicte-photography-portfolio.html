<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Derelicte | Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-bg: #0a0a0a;
            --darker-bg: #000000;
            --accent: #1a1a1a;
            --text: #e0e0e0;
            --text-faint: #a0a0a0;
            --gradient-start: #1a1a1a;
            --gradient-end: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
            color: var(--text);
            font-family: 'Bebas Neue', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 4rem;
        }

        h1 {
            font-size: 5rem;
            font-weight: 400;
            letter-spacing: 0.4rem;
            margin-bottom: 1rem;
            color: var(--text);
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 1.5rem;
            color: var(--text-faint);
            letter-spacing: 0.3rem;
            margin-bottom: 2rem;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            margin: 0 auto 3rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            aspect-ratio: 4/3;
            background-color: var(--darker-bg);
            border: 1px solid var(--accent);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.2);
            opacity: 0.85;
            transition: all 0.4s ease;
        }

        .gallery-item:hover img {
            filter: grayscale(0%) contrast(1.1);
            opacity: 1;
        }

        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.5), rgba(0, 0, 0, 0.5));
            pointer-events: none;
        }

        footer {
            margin-top: 4rem;
            color: var(--text-faint);
            font-size: 1rem;
            letter-spacing: 0.1rem;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 3rem;
                letter-spacing: 0.3rem;
            }
            .subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>DERELICTE</h1>
        <p class="subtitle">PHOTOGRAPHY</p>
        <div class="divider"></div>
    </header>

    <main class="gallery">
        <div class="gallery-item">
            <img src="https://via.placeholder.com/600x450/121212/3a3a3a?text=Image+1" alt="Photography sample 1">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/600x450/121212/3a3a3a?text=Image+2" alt="Photography sample 2">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/600x450/121212/3a3a3a?text=Image+3" alt="Photography sample 3">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/600x450/121212/3a3a3a?text=Image+4" alt="Photography sample 4">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/600x450/121212/3a3a3a?text=Image+5" alt="Photography sample 5">
        </div>
        <div class="gallery-item">
            <img src="https://via.placeholder.com/600x450/121212/3a3a3a?text=Image+6" alt="Photography sample 6">
        </div>
    </main>

    <footer>
        <p>© 2026 Derelicte Photography. All rights reserved.</p>
    </footer>
</body>
</html>
